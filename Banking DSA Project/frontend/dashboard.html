<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Banking DSA System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .hidden {
            display: none !important;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-xl font-bold tracking-tight text-gray-900">Banking<span
                            class="text-blue-600">DSA</span></span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="welcomeText" class="text-sm text-gray-600"></span>
                    <button id="logoutBtn"
                        class="bg-gray-900 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-800 transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <!-- Header -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900">My Dashboard</h2>
                    <p class="text-gray-500">Manage your accounts and transactions</p>
                </div>
                <div class="flex gap-3">
                    <button id="searchBtn"
                        class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        Search Users
                    </button>
                    <button id="createAccountBtn"
                        class="flex items-center gap-2 px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 4v16m8-8H4"></path>
                        </svg>
                        New Account
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Left Column -->
                <div class="lg:col-span-2 space-y-8">
                    <!-- Total Balance -->
                    <div class="bg-gray-900 text-white p-8 rounded-2xl shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-gray-400 text-sm font-medium">Total Balance</p>
                                <h3 class="text-4xl font-bold mt-2" id="totalBalance">₹0.00</h3>
                            </div>
                            <div class="p-2 bg-gray-800 rounded-lg">
                                <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                                    </path>
                                </svg>
                            </div>
                        </div>
                        <div class="flex items-center text-sm text-gray-400">
                            <span class="text-green-400 flex items-center mr-2">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                                </svg>
                                +12.5%
                            </span>
                            from last month
                        </div>
                    </div>

                    <!-- Accounts List -->
                    <div>
                        <h3 class="text-lg font-bold text-gray-900 mb-4">My Accounts</h3>
                        <div id="accountsList" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="space-y-8">
                    <!-- Quick Actions -->
                    <div class="bg-white p-6 rounded-xl border border-gray-200">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">Quick Actions</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <button id="depositBtn"
                                class="p-3 text-center rounded-lg border border-gray-100 hover:bg-gray-50 hover:border-gray-200 transition-all">
                                <div
                                    class="w-8 h-8 mx-auto bg-green-50 text-green-600 rounded-full flex items-center justify-center mb-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                                    </svg>
                                </div>
                                <span class="text-xs font-medium text-gray-700">Deposit</span>
                            </button>
                            <button id="withdrawBtn"
                                class="p-3 text-center rounded-lg border border-gray-100 hover:bg-gray-50 hover:border-gray-200 transition-all">
                                <div
                                    class="w-8 h-8 mx-auto bg-red-50 text-red-600 rounded-full flex items-center justify-center mb-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
                                    </svg>
                                </div>
                                <span class="text-xs font-medium text-gray-700">Withdraw</span>
                            </button>
                            <button id="transferBtn"
                                class="p-3 text-center rounded-lg border border-gray-100 hover:bg-gray-50 hover:border-gray-200 transition-all">
                                <div
                                    class="w-8 h-8 mx-auto bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                                    </svg>
                                </div>
                                <span class="text-xs font-medium text-gray-700">Transfer</span>
                            </button>
                            <button id="newTransactionBtn"
                                class="p-3 text-center rounded-lg border border-gray-100 hover:bg-gray-50 hover:border-gray-200 transition-all">
                                <div
                                    class="w-8 h-8 mx-auto bg-purple-50 text-purple-600 rounded-full flex items-center justify-center mb-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                    </svg>
                                </div>
                                <span class="text-xs font-medium text-gray-700">More</span>
                            </button>
                        </div>
                    </div>

                    <!-- Recent Transactions -->
                    <div class="bg-white p-6 rounded-xl border border-gray-200">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">Recent Activity</h3>
                        <div id="transactionsList" class="space-y-4">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <p class="text-gray-400 text-sm">© 2025 Banking DSA Project. Educational Purpose Only.</p>
                <div class="flex gap-4">
                    <button id="exportUsersBtn" class="text-sm text-gray-500 hover:text-gray-900 font-medium transition-colors">
                        Download Users CSV
                    </button>
                    <button id="exportTransBtn" class="text-sm text-gray-500 hover:text-gray-900 font-medium transition-colors">
                        Download Transactions CSV
                    </button>
                </div>
            </div>
        </div>
    </footer>

    <!-- Modal Overlay -->
    <div id="modalOverlay"
        class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div id="modal"
            class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4 p-6 transform scale-95 transition-transform duration-300">
            <!-- Modal Content Injected Here -->
        </div>
    </div>

    <script src="js/trie.js"></script>
    <script src="js/data.js"></script>
    <script src="js/views.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
